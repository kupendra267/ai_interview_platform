<!DOCTYPE html>
<html>
<head>

    <title>AI Mock HR Interview</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(to right,#141e30,#243b55);
            color:white;
            font-family:Arial;
            padding:40px;
        }

        .box{
            max-width:800px;
            margin:auto;
            background:rgba(255,255,255,0.1);
            padding:40px;
            border-radius:20px;
        }

        .question-box{
            font-size:28px;
            margin-bottom:30px;
            color:#00d4ff;
        }

        textarea{
            height:150px;
        }

        .btn-custom{
            background:#00d4ff;
            border:none;
            padding:12px 25px;
            border-radius:10px;
            font-weight:bold;
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="box">

    <h1 class="mb-4">
        👨‍💼 AI Mock HR Interview
    </h1>

    <div class="question-box"
         id="question">

    </div>

    <textarea
        class="form-control"
        placeholder="Type your answer here..."
        id="answer">
    </textarea>

    <button
        class="btn-custom"
        onclick="nextQuestion()">

        Next Question

    </button>

    <div
        class="mt-4"
        id="status">

    </div>

</div>

<script>

    let questions = [

        "Tell me about yourself",

        "What are your strengths?",

        "What are your weaknesses?",

        "Why should we hire you?",

        "Where do you see yourself in 5 years?",

        "What is your salary expectation?"

    ];

    let current = 0;

    let questionBox =
        document.getElementById("question");

    let statusBox =
        document.getElementById("status");

    function loadQuestion(){

        questionBox.innerHTML =
            questions[current];

    }

    loadQuestion();

    function nextQuestion(){

        let answer =
            document.getElementById("answer").value;

        if(answer.trim() == ""){

            alert("Please enter answer");

            return;
        }

        current++;

        document.getElementById("answer").value = "";

        if(current < questions.length){

            loadQuestion();

            statusBox.innerHTML =
                "Answer saved ✅";

        }
        else{

            questionBox.innerHTML =
                "HR Interview Completed ✅";

            statusBox.innerHTML =
                "Great Job!";

        }

    }

</script>

</body>
</html>
