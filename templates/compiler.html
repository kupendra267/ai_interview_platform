<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Coding Compiler</title>

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:linear-gradient(to right,#141e30,#243b55);
            min-height:100vh;
            padding:40px;
            font-family:Arial;
            color:white;
        }

        .compiler-box{
            max-width:1100px;
            margin:auto;
            background:rgba(255,255,255,0.08);
            padding:40px;
            border-radius:25px;
            backdrop-filter:blur(10px);
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            margin-bottom:35px;
            color:#00d4ff;
            font-weight:bold;
        }

        select{
            height:55px;
            border-radius:12px;
            margin-bottom:25px;
            font-size:18px;
        }

        #editor{
            height:500px;
            border-radius:15px;
            overflow:hidden;
            border:2px solid #00d4ff;
        }

        .btn-run{
            background:#00d4ff;
            border:none;
            padding:14px 35px;
            border-radius:12px;
            font-size:18px;
            font-weight:bold;
            margin-top:25px;
            transition:0.3s;
        }

        .btn-run:hover{
            transform:scale(1.05);
        }

        .output-box{
            margin-top:30px;
            background:black;
            color:#00ff88;
            padding:25px;
            border-radius:15px;
            min-height:120px;
            font-size:20px;
            white-space:pre-wrap;
            border:2px solid #00ff88;
        }

    </style>

</head>

<body>

<div class="compiler-box">

    <h1>
        💻 AI Coding Interview Compiler
    </h1>

    <!-- LANGUAGE -->

    <label class="mb-2">
        Select Language
    </label>

    <select class="form-control"
            id="language">

        <option value="python">
            Python
        </option>

        <option value="cpp">
            C++
        </option>

        <option value="java">
            Java
        </option>

    </select>

    <!-- MONACO EDITOR -->

    <div id="editor"></div>

    <!-- RUN BUTTON -->

    <button
        class="btn-run"
        onclick="runCode()">

        ▶ Run Code

    </button>

    <!-- OUTPUT -->

    <div class="output-box"
         id="output">

        Output will appear here...

    </div>

</div>

<!-- MONACO EDITOR -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>

<script>

require.config({

    paths:{

        vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs'

    }

});

require(['vs/editor/editor.main'], function(){

    window.editor = monaco.editor.create(

        document.getElementById('editor'),

        {

            value:
`print("Hello Kupendra")`,

            language:'python',

            theme:'vs-dark',

            automaticLayout:true,

            fontSize:18,

            minimap:{
                enabled:false
            }

        }

    );

});


// LANGUAGE CHANGE

document.getElementById("language")
.addEventListener("change", function(){

    let lang = this.value;

    if(lang == "python"){

        monaco.editor.setModelLanguage(
            editor.getModel(),
            'python'
        );

        editor.setValue(
`print("Hello Kupendra")`
        );
    }

    else if(lang == "cpp"){

        monaco.editor.setModelLanguage(
            editor.getModel(),
            'cpp'
        );

        editor.setValue(
`#include<iostream>

using namespace std;

int main(){

    cout<<"Hello Kupendra";

}`
        );
    }

    else if(lang == "java"){

        monaco.editor.setModelLanguage(
            editor.getModel(),
            'java'
        );

        editor.setValue(
`class Main{

    public static void main(String args[]){

        System.out.println("Hello Kupendra");

    }

}`
        );
    }

});


// RUN CODE

async function runCode(){

    let code =
        editor.getValue();

    let language =
        document.getElementById("language").value;

    let output =
        document.getElementById("output");

    output.innerHTML =
        "Running Code...";

    try{

        let formData = new FormData();

        formData.append("code", code);

        formData.append("language", language);

        let response = await fetch(
            "/run_code",
            {

                method:"POST",

                body:formData

            }
        );

        let result =
            await response.text();

        output.innerHTML =
            result;

    }

    catch(error){

        output.innerHTML =
            "Error Running Code ❌";

    }

}

</script>

</body>

</html>
