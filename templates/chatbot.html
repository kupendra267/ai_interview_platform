<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Chatbot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(to right,#141e30,#243b55);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial;
            color:white;
        }

        .chat-box{
            width:700px;
            background:rgba(255,255,255,0.08);
            padding:40px;
            border-radius:25px;
            backdrop-filter:blur(10px);
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#00d4ff;
        }

        .form-control{
            height:55px;
            border-radius:12px;
            margin-bottom:20px;
        }

        .btn-custom{
            width:100%;
            height:55px;
            background:#00d4ff;
            border:none;
            border-radius:12px;
            font-size:18px;
            font-weight:bold;
        }

        .btn-custom:hover{
            background:white;
        }

        .answer-box{
            margin-top:30px;
            background:rgba(255,255,255,0.08);
            padding:25px;
            border-radius:15px;
            line-height:1.8;
        }

    </style>

</head>

<body>

<div class="chat-box">

    <h1>🤖 AI Chatbot</h1>

    <form method="POST">

        <input
            type="text"
            name="question"
            class="form-control"
            placeholder="Ask anything..."
            required
        >

        <button class="btn-custom">

            Ask AI

        </button>

    </form>

    {% if answer %}

        <div class="answer-box">

            {{ answer }}

        </div>

    {% endif %}

</div>

</body>

</html>
