<!DOCTYPE html>
<html>
<head>

<title>Forgot Password</title>

<style>

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.box{
    background:#1e293b;
    padding:40px;
    border-radius:20px;
    width:350px;
    text-align:center;
}

h1{
    color:#00f7ff;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00f7ff;
    margin-top:20px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

p{
    color:white;
    margin-top:15px;
}

.success{
    color:#22c55e;
    margin-top:15px;
    font-weight:bold;
}

.error{
    color:red;
    margin-top:15px;
}

a{
    color:white;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

    <h1>Forgot Password</h1>

    <form method="POST">

        <input type="email"
               name="email"
               placeholder="Enter Email"
               required>

        <button type="submit">
            Send New Password
        </button>

    </form>

    {% if message %}
        <p class="success">{{ message }}</p>
    {% endif %}

    <p>
        <a href="/login">Back To Login</a>
    </p>

</div>

</body>
</html>
