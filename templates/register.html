<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right,#141e30,#243b55);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial;
        }

        .register-box{
            background:rgba(255,255,255,0.1);
            padding:40px;
            border-radius:20px;
            width:400px;
            backdrop-filter:blur(10px);
            color:white;
        }

        h2{
            text-align:center;
            margin-bottom:30px;
        }

        .form-control{
            margin-bottom:20px;
            height:50px;
        }

        .btn-custom{
            width:100%;
            background:#00d4ff;
            border:none;
            height:50px;
            font-weight:bold;
            border-radius:10px;
        }

        .btn-custom:hover{
            background:white;
        }

        a{
            color:#00d4ff;
            text-decoration:none;
        }

    </style>

</head>
<body>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}

                <div class="alert alert-info text-center m-3 position-absolute top-0">
                    {{ message }}
                </div>

            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="register-box">

        <h2>Create Account</h2>

        <form method="POST" action="/register">

            <input type="text"
                   name="name"
                   class="form-control"
                   placeholder="Enter Name"
                   required>

            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Enter Email"
                   required>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter Password"
                   required>

            <button type="submit" class="btn btn-custom">
                Register
            </button>

        </form>

        <p class="mt-3 text-center">
            Already have account?
            <a href="/login">Login</a>
        </p>

    </div>

</body>
</html>
