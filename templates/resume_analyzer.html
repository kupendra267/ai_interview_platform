<!DOCTYPE html>
<html>
<head>

    <title>Resume Analyzer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(to right,#141e30,#243b55);
            color:white;
            padding:40px;
            font-family:Arial;
        }

        .box{
            max-width:800px;
            margin:auto;
            background:rgba(255,255,255,0.1);
            padding:40px;
            border-radius:20px;
        }

        .btn-custom{
            background:#00d4ff;
            border:none;
            padding:12px;
            width:100%;
            border-radius:10px;
            font-weight:bold;
        }

        pre{
            color:white;
            white-space:pre-wrap;
        }

    </style>

</head>

<body>

<div class="box">

    <h1 class="mb-4">
        📄 Resume Analyzer AI
    </h1>

    <form method="POST"
          enctype="multipart/form-data">

        <input
            type="file"
            name="resume"
            class="form-control mb-3"
            required
        >

        <button class="btn-custom">
            Analyze Resume
        </button>

    </form>

    {% if result %}

        <div class="mt-4">

            <pre>{{ result }}</pre>

        </div>

    {% endif %}

</div>

</body>
</html>
