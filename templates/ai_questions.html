<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Questions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(to right,#141e30,#243b55);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial;
            color:white;
        }

        .question-box{
            width:700px;
            background:rgba(255,255,255,0.08);
            padding:40px;
            border-radius:25px;
            backdrop-filter:blur(10px);
        }

        h2{
            text-align:center;
            margin-bottom:30px;
            color:#00d4ff;
        }

        .form-control{
            height:50px;
            margin-bottom:20px;
        }

        .btn-custom{
            width:100%;
            height:50px;
            background:#00d4ff;
            border:none;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
        }

        .question-card{
            background:rgba(255,255,255,0.1);
            padding:15px;
            border-radius:10px;
            margin-top:15px;
        }

    </style>

</head>

<body>

<div class="question-box">

    <h2>AI Question Generator</h2>

    <form method="POST">

        <input
            type="text"
            name="skill"
            class="form-control"
            placeholder="Enter Skill"
            required
        >

        <button type="submit" class="btn-custom">
            Generate Questions
        </button>

    </form>

    {% for q in questions %}

        {% if q.strip() != "" %}

            <div class="question-card">

                {{ q }}

            </div>

        {% endif %}

    {% endfor %}

</div>

</body>

</html>
