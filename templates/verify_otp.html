<!DOCTYPE html>
<html>
<head>

<title>Verify OTP</title>

<style>

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.box{
    background:#1e293b;
    padding:40px;
    border-radius:20px;
    width:350px;
    text-align:center;
}

h1{
    color:#00f7ff;
}

input{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#00f7ff;
    font-weight:bold;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h1>Verify OTP</h1>

<form method="POST">

<input type="text"
       name="otp"
       placeholder="Enter OTP"
       required>

<button type="submit">
Verify OTP
</button>

</form>

</div>

</body>
</html>
