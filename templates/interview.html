<!DOCTYPE html>
<html>
<head>

    <title>Interview</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(to right,#141e30,#243b55);
            color:white;
            padding:50px;
            font-family:Arial;
            min-height:100vh;
        }

        .box{
            background:rgba(255,255,255,0.1);
            padding:40px;
            border-radius:20px;
            max-width:750px;
            margin:auto;
            backdrop-filter:blur(10px);
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#00d4ff;
        }

        .timer-box{
            background:rgba(255,255,255,0.08);
            padding:15px;
            border-radius:15px;
            text-align:center;
            font-size:24px;
            font-weight:bold;
            margin-bottom:30px;
            color:#00ffcc;
        }

        .question-box{
            background:rgba(255,255,255,0.08);
            padding:20px;
            border-radius:15px;
            margin-bottom:25px;
        }

        .question-box h4{
            margin-bottom:15px;
        }

        .form-control{
            height:50px;
            border-radius:10px;
        }

        .btn-custom{
            width:100%;
            height:55px;
            background:#00d4ff;
            border:none;
            border-radius:12px;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn-custom:hover{
            background:white;
            transform:scale(1.02);
        }

    </style>

</head>

<body>

<div class="box">

    <h1>AI Mock Interview</h1>

    <!-- TIMER -->

    <div class="timer-box">

        ⏳ Interview Time Left:
        <span id="timer">120</span>s

    </div>

    <!-- INTERVIEW FORM -->

    <form method="POST">

        {% for q in questions %}

            <div class="question-box">

                <h4>

                    {{ loop.index }}.
                    {{ q.question }}

                </h4>

                <input
                    type="text"
                    name="answer{{ loop.index0 }}"
                    class="form-control"
                    placeholder="Enter Answer"
                    required
                >

            </div>

        {% endfor %}

        <button class="btn-custom">

            Submit Interview

        </button>

    </form>

</div>

<!-- TIMER SCRIPT -->

<script>

    let timeLeft = 120;

    let timer = document.getElementById("timer");

    let form = document.querySelector("form");

    let countdown = setInterval(function(){

        timeLeft--;

        timer.innerHTML = timeLeft;

        if(timeLeft <= 10){

            timer.style.color = "red";
        }

        if(timeLeft <= 0){

            clearInterval(countdown);

            alert("⏳ Interview Submitted Automatically");

            form.submit();
        }

    },1000);

</script>

</body>
</html>
