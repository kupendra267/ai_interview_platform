<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <style>

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
        }

        .box{
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            width:350px;
            text-align:center;
        }

        h1{
            color:#00f7ff;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:none;
            border-radius:10px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#00f7ff;
            color:black;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        p{
            color:red;
            margin-top:15px;
        }

    </style>
</head>

<body>

    <div class="box">

        <h1>Reset Password</h1>

        <form method="POST">

            <input type="password"
                   name="password"
                   placeholder="New Password"
                   required>

            <input type="password"
                   name="confirm_password"
                   placeholder="Confirm Password"
                   required>

            <button type="submit">
                Update Password
            </button>

        </form>

        {% if message %}
            <p>{{ message }}</p>
        {% endif %}

    </div>

</body>
</html>
