<!DOCTYPE html>
<html>
<head>

    <title>Quiz Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(to right,#141e30,#243b55);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-family:Arial;
        }

        .box{
            background:rgba(255,255,255,0.1);
            padding:50px;
            border-radius:20px;
            text-align:center;
            width:500px;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>Quiz Completed</h1>

    <h2 class="mt-4">
        Your Score: {{ score }}/3
    </h2>

    <a href="/dashboard" class="btn btn-info mt-4">
        Back Dashboard
    </a>

</div>

</body>
</html>
