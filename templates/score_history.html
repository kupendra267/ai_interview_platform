<!DOCTYPE html>
<html>
<head>

    <title>Score History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(to right,#141e30,#243b55);
            color:white;
            font-family:Arial;
            padding:40px;
        }

        .box{
            background:rgba(255,255,255,0.1);
            padding:40px;
            border-radius:20px;
            margin-bottom:40px;
        }

        table{
            color:white !important;
        }

        h1,h2{
            text-align:center;
        }

    </style>

</head>

<body>

<h1 class="mb-5">
    Your Score History
</h1>

<!-- Interview History -->

<div class="box">

    <h2 class="mb-4">
        Interview History
    </h2>

    <table class="table table-bordered table-dark">

        <tr>
            <th>Score</th>
            <th>Date</th>
        </tr>

        {% for row in interview_history %}

        <tr>

            <td>{{ row[0] }}</td>

            <td>{{ row[1] }}</td>

        </tr>

        {% endfor %}

    </table>

</div>

<!-- Quiz History -->

<div class="box">

    <h2 class="mb-4">
        Quiz History
    </h2>

    <table class="table table-bordered table-dark">

        <tr>
            <th>Score</th>
            <th>Date</th>
        </tr>

        {% for row in quiz_history %}

        <tr>

            <td>{{ row[0] }}</td>

            <td>{{ row[1] }}</td>

        </tr>

        {% endfor %}

    </table>

</div>

<div class="text-center">

    <a href="/dashboard" class="btn btn-info">
        Back Dashboard
    </a>

</div>

</body>
</html>
